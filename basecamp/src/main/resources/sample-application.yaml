## Copy this file to your application resource directory.

# Spring Property 적용 우선 순위.
#  1. **커맨드 라인 인자** (`--spring.datasource.url=...`)
#  2. **Java 시스템 프로퍼티** (`System.setProperty()`)
#  3. **OS 환경 변수**
#  4. **application-{profile}.yml/properties** (프로파일별 설정)
#  5. --- 로 분리된 경우, 아래 쪽 섹션.
#  6. **spring.config.import로 임포트된 파일**
#  7. **application.yml/properties** (기본 설정)

spring:
  config:
    import:
      - db-config.yaml
---


spring.application.name: basecamp


server:
  # port: 8080
  ## Application 별 시작 주소 설정. 주의) Swagger 와 Actuator 에도 영향을 미침.
  # servlet.contextPath: "/sample-app"
  compression.enabled: true


spring:
  session:
    timeout: 3600     # Session timeout.


basecamp:
  auth:
    secret: any-secret-text-more-than-64-bytes/any-secret-text-more-than-64-bytes/
    access-token-period-in-sec: 86400 # 24 hour
    refresh-token-period-in-sec: 86400 # 24 hour

    public-urls:
      - /favicon.ico
      - /error
      - /actuator/**
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-resources/**
      - /auth/login
      - /auth/register

  cors:
    allowed-origins:
      - "https://your-frontend-domain.com"
      - "http://localhost:3000"
    allowed-methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed-headers:
      - "*"
    exposed-headers:
      - "Authorization"
    allow-credentials: true
    max-age: 3600